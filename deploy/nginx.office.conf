server {
    listen 80;
    server_name office.esportsza.co.za;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name office.esportsza.co.za;

    # Replace with your real certificate paths
    ssl_certificate /etc/letsencrypt/live/office.esportsza.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/office.esportsza.co.za/privkey.pem;

    auth_basic "Mission Control";
    auth_basic_user_file /etc/nginx/.htpasswd-office;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /srv/openclaw-office/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /ws {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
